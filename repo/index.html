<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Life Coach Dashboard</title>

<!-- PWA-ish -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Life Coach">
<meta name="theme-color" content="#0b0d12">
<link rel="manifest" href='data:application/manifest+json,{"name":"Life Coach Dashboard","short_name":"LifeCoach","start_url":".","display":"standalone","background_color":"%230b0d12","theme_color":"%230b0d12","icons":[]}'>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2316a34a'/%3E%3Ctext x='50' y='65' font-size='55' text-anchor='middle' fill='white' font-family='sans-serif'%3ELC%3C/text%3E%3C/svg%3E">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>

<style>
  :root{
    --bg:#0b0d12;
    --card:#151822;
    --card2:#1b1f2b;
    --border:#252a38;
    --text:#eef1f7;
    --muted:#8b93a7;
    --accent:#22c55e;
    --accent2:#3b82f6;
    --warn:#f59e0b;
    --bad:#ef4444;
    --protein:#22c55e;
    --carbs:#3b82f6;
    --fat:#f59e0b;
    --kcal:#a78bfa;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  body{
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    padding-bottom: 32px;
  }
  header{
    position:sticky; top:0; z-index:10;
    background:rgba(11,13,18,0.9); backdrop-filter:blur(10px);
    padding:16px 16px 10px; border-bottom:1px solid var(--border);
  }
  header h1{margin:0; font-size:19px; font-weight:700;}
  header .sub{color:var(--muted); font-size:12.5px; margin-top:3px;}
  .wrap{padding:14px; max-width:640px; margin:0 auto;}
  section{margin-bottom:22px;}
  .section-title{
    font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em;
    color:var(--muted); margin:0 0 10px 4px;
  }
  .card{
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    padding:16px; margin-bottom:12px;
  }
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .grid3{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}

  /* Rings */
  .ring-row{display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;}
  .ring{position:relative; width:104px; height:104px; flex:0 0 auto;}
  .ring svg{transform:rotate(-90deg);}
  .ring-label{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .ring-label .val{font-size:17px; font-weight:800;}
  .ring-label .tgt{font-size:10.5px; color:var(--muted);}
  .ring-cap{text-align:center; font-size:11.5px; color:var(--muted); margin-top:6px; text-transform:uppercase; letter-spacing:.04em;}

  .macro-bars{display:flex; flex-direction:column; gap:12px; margin-top:14px;}
  .macro-bar-row{}
  .macro-bar-row .top{display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:5px;}
  .macro-bar-row .top .name{color:var(--text); font-weight:600;}
  .macro-bar-row .top .nums{color:var(--muted);}
  .bar-track{background:var(--card2); border-radius:8px; height:9px; overflow:hidden;}
  .bar-fill{height:100%; border-radius:8px; transition:width .4s ease;}

  .meal-item{
    display:flex; justify-content:space-between; align-items:center; gap:10px;
    padding:10px 0; border-bottom:1px solid var(--border);
  }
  .meal-item:last-child{border-bottom:none;}
  .meal-item .desc{font-size:14px; font-weight:600;}
  .meal-item .time{font-size:11px; color:var(--muted); margin-top:2px;}
  .meal-item .kcal{font-size:14px; font-weight:700; color:var(--kcal); white-space:nowrap;}
  .meal-item .macros{font-size:11px; color:var(--muted); margin-top:2px;}

  .empty{
    text-align:center; color:var(--muted); padding:28px 12px; font-size:13.5px;
  }
  .empty .emoji{font-size:26px; display:block; margin-bottom:8px;}

  canvas{max-width:100%;}
  .chart-wrap{position:relative; height:200px;}
  .chart-wrap.tall{height:230px;}
  .chart-wrap.short{height:120px;}

  .legend{display:flex; gap:14px; flex-wrap:wrap; margin-top:10px; font-size:11.5px; color:var(--muted);}
  .legend span{display:inline-flex; align-items:center; gap:5px;}
  .dot{width:8px; height:8px; border-radius:50%; display:inline-block;}

  .stat-pill{
    background:var(--card2); border-radius:12px; padding:10px 12px; text-align:center;
  }
  .stat-pill .num{font-size:18px; font-weight:800;}
  .stat-pill .lbl{font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.03em; margin-top:2px;}

  .phase-tag{
    display:inline-block; background:rgba(34,197,94,0.12); color:var(--accent);
    border:1px solid rgba(34,197,94,0.35); border-radius:999px; padding:3px 10px;
    font-size:11.5px; font-weight:700;
  }

  .type-tag{
    display:inline-block; padding:4px 10px; border-radius:999px;
    font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.03em;
    white-space:nowrap;
  }
  .type-strength{ background:rgba(34,197,94,0.12); color:var(--accent); border:1px solid rgba(34,197,94,0.35); }
  .type-cardio{ background:rgba(59,130,246,0.12); color:var(--accent2); border:1px solid rgba(59,130,246,0.35); }
  .type-rest{ background:rgba(139,147,167,0.12); color:var(--muted); border:1px solid rgba(139,147,167,0.35); }

  .workout-item{
    display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--border); font-size:13.5px;
  }
  .workout-item:last-child{border-bottom:none;}
  .workout-item .t{font-weight:600;}
  .workout-item .m{color:var(--muted);}

  .footer-note{text-align:center; color:var(--muted); font-size:11px; margin-top:18px;}
</style>
</head>
<body>

<header>
  <h1 id="headerName">Life Coach</h1>
  <div class="sub" id="headerSub">Loading…</div>
</header>

<div class="wrap">

  <!-- TODAY -->
  <section>
    <div class="section-title">Today</div>
    <div class="card" id="todayCard">
      <div class="empty"><span class="emoji">⏳</span>Loading today's data…</div>
    </div>
  </section>

  <!-- TRAINING -->
  <section>
    <div class="section-title">Training</div>
    <div class="card" id="todayWorkoutCard" style="display:none;">
      <div style="font-size:13px; font-weight:700; margin-bottom:10px;">Today's Workout</div>
      <div id="todayWorkoutBody"></div>
    </div>
    <div class="card" id="trainingCard">
      <div class="empty"><span class="emoji">🏋️</span>No workouts logged yet</div>
    </div>
    <div class="card" id="liftCard">
      <div style="font-size:13px; font-weight:700; margin-bottom:10px;">Strength Progression</div>
      <div id="liftBody"></div>
    </div>
    <div class="card" id="hrCard" style="display:none;">
      <div style="font-size:13px; font-weight:700; margin-bottom:6px;">Resting Heart Rate</div>
      <div class="chart-wrap short"><canvas id="hrChart"></canvas></div>
    </div>
  </section>

  <!-- 14 DAY TRENDS -->
  <section>
    <div class="section-title">14-Day Trends</div>
    <div class="card">
      <div style="font-size:13px; font-weight:700; margin-bottom:6px;">Calories vs Target</div>
      <div class="chart-wrap"><canvas id="kcalChart"></canvas></div>
    </div>
    <div class="card">
      <div style="font-size:13px; font-weight:700; margin-bottom:6px;">Protein vs Target</div>
      <div class="chart-wrap"><canvas id="proteinChart"></canvas></div>
    </div>
  </section>

  <!-- WEIGHT -->
  <section>
    <div class="section-title">Weight</div>
    <div class="card" id="weightCard">
      <div class="empty"><span class="emoji">⚖️</span>No weight data yet</div>
    </div>
  </section>

  <!-- MEALS LOGGED TODAY -->
  <section>
    <div class="section-title">Meals Logged Today</div>
    <div class="card" id="mealsCard" style="display:none;">
      <div id="mealsList"></div>
    </div>
  </section>

  <div class="footer-note" id="lastUpdated"></div>

</div>

<script>
(function(){

  // Fallback stub: if Chart.js failed to load, render everything except charts
  if(!window.Chart){
    window.Chart = function(ctx){
      const el = ctx && ctx.parentElement ? ctx.parentElement : null;
      if(el) el.innerHTML = '<div class="empty">Chart library failed to load</div>';
    };
    window.Chart.defaults = {font:{}};
  }

  const CHART_COLORS = {
    kcal: '#a78bfa',
    kcalTarget: '#6b7280',
    protein: '#22c55e',
    proteinTarget: '#6b7280',
    carbs: '#3b82f6',
    fat: '#f59e0b',
    weight: '#3b82f6',
    weightMA: '#22c55e',
    hr: '#ef4444',
    bench: '#22c55e',
    squat: '#3b82f6',
    deadlift: '#a78bfa',
    ohp: '#f59e0b'
  };

  const MAIN_LIFTS = ['bench', 'squat', 'deadlift', 'ohp'];
  const LIFT_LABELS = {bench: 'Bench', squat: 'Squat', deadlift: 'Deadlift', ohp: 'OHP'};

  const PHASE_NAMES = {
    base_bulk: 'Lean Bulk',
    aggressive_bulk: 'Bulk',
    shred: 'Cut',
    summer_maintain: 'Maintenance'
  };

  function phaseDisplayName(key){
    if(!key) return '';
    if(PHASE_NAMES[key]) return PHASE_NAMES[key];
    return String(key).replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  Chart.defaults.color = '#8b93a7';
  Chart.defaults.font.family = "-apple-system, BlinkMacSystemFont, sans-serif";
  Chart.defaults.font.size = 11;

  function cacheBust(url){ return url + (url.includes('?') ? '&' : '?') + 't=' + Date.now(); }

  async function fetchJSON(path, fallback){
    try{
      const res = await fetch(cacheBust(path), {cache:'no-store'});
      if(!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      return data;
    }catch(e){
      console.warn('Failed to load', path, e);
      return fallback;
    }
  }

  function todayStr(){
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  }

  function daysAgoStr(n){
    const d = new Date();
    d.setDate(d.getDate() - n);
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  }

  function fmtDateShort(dstr){
    const d = new Date(dstr + 'T00:00:00');
    return d.toLocaleDateString(undefined, {month:'short', day:'numeric'});
  }

  function weekdayShort(dstr){
    const d = new Date(dstr + 'T00:00:00');
    return d.toLocaleDateString(undefined, {weekday:'short'});
  }

  const WEEKDAY_KEYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  function todayWeekdayKey(){
    return WEEKDAY_KEYS[new Date().getDay()];
  }

  function startOfWeekStr(){
    // Monday as start of week
    const d = new Date();
    const day = d.getDay(); // 0 Sun .. 6 Sat
    const diff = (day === 0 ? -6 : 1) - day;
    d.setDate(d.getDate() + diff);
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${dd}`;
  }

  function ringSVG(pct, color, size=104, stroke=10){
    pct = Math.max(0, Math.min(pct, 100));
    const r = (size - stroke) / 2;
    const c = 2 * Math.PI * r;
    const offset = c - (pct/100) * c;
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1b1f2b" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
        stroke-dasharray="${c}" stroke-dashoffset="${offset}" stroke-linecap="round"/>
    </svg>`;
  }

  function clampPct(v, t){ if(!t) return 0; return Math.min(100, Math.max(0, (v/t)*100)); }

  async function init(){
    const [profile, foodLog, weightLog, healthDaily, trainingPlan, liftLog] = await Promise.all([
      fetchJSON('./data/profile.json', null),
      fetchJSON('./data/food-log.json', []),
      fetchJSON('./data/weight-log.json', []),
      fetchJSON('./data/health-daily.json', []),
      fetchJSON('./data/training-plan.json', null),
      fetchJSON('./data/lift-log.json', [])
    ]);

    renderHeader(profile);
    renderToday(profile, foodLog);
    renderTodayWorkout(trainingPlan);
    renderTraining(healthDaily, trainingPlan);
    renderLifts(liftLog);
    renderTrends(profile, foodLog);
    renderWeight(profile, weightLog);

    document.getElementById('lastUpdated').textContent =
      'Updated ' + new Date().toLocaleString(undefined, {month:'short', day:'numeric', hour:'numeric', minute:'2-digit'});
  }

  function getActivePhase(profile){
    if(!profile || !profile.phases || !profile.current_phase) return null;
    return profile.phases[profile.current_phase] || null;
  }

  function renderHeader(profile){
    const nameEl = document.getElementById('headerName');
    const subEl = document.getElementById('headerSub');
    if(!profile){
      nameEl.textContent = 'Life Coach';
      subEl.textContent = 'Could not load profile';
      return;
    }
    nameEl.textContent = profile.name ? `${profile.name}'s Dashboard` : 'Life Coach';
    const phase = getActivePhase(profile);
    let sub = '';
    const age = profile.age || (profile.athlete && profile.athlete.age);
    const wt = profile.weight_lb || (profile.athlete && profile.athlete.starting_weight_lb);
    if(age) sub += `${age}y`;
    if(wt) sub += (sub?' · ':'') + `${wt} lb`;
    if(profile.current_phase) sub += (sub?' · ':'') + `Phase: ${phaseDisplayName(profile.current_phase)}`;
    if(phase && phase.window) sub += ` (${phase.window})`;
    subEl.textContent = sub || 'Welcome back';
  }

  function renderToday(profile, foodLog){
    const card = document.getElementById('todayCard');
    const phase = getActivePhase(profile);
    const today = todayStr();
    const todaysMeals = (foodLog || []).filter(m => m.date === today);

    if(!phase){
      card.innerHTML = `<div class="empty"><span class="emoji">🎯</span>No active phase/targets set in profile.json</div>`;
    } else {
      const targets = phase.targets || phase;
      const totals = todaysMeals.reduce((acc, m) => {
        acc.kcal += Number(m.kcal)||0;
        acc.protein_g += Number(m.protein_g)||0;
        acc.carbs_g += Number(m.carbs_g)||0;
        acc.fat_g += Number(m.fat_g)||0;
        return acc;
      }, {kcal:0, protein_g:0, carbs_g:0, fat_g:0});

      const kcalPct = clampPct(totals.kcal, targets.kcal);

      card.innerHTML = `
        <div class="ring-row">
          <div style="flex:1; min-width:120px;">
            <div class="ring" style="margin:0 auto;">
              ${ringSVG(kcalPct, CHART_COLORS.kcal)}
              <div class="ring-label">
                <div class="val">${Math.round(totals.kcal)}</div>
                <div class="tgt">of ${targets.kcal ?? '—'}</div>
              </div>
            </div>
            <div class="ring-cap">Calories</div>
          </div>
        </div>
        <div class="macro-bars">
          ${macroBarRow('Protein', totals.protein_g, targets.protein_g, CHART_COLORS.protein, 'g')}
          ${macroBarRow('Carbs', totals.carbs_g, targets.carbs_g, CHART_COLORS.carbs, 'g')}
          ${macroBarRow('Fat', totals.fat_g, targets.fat_g, CHART_COLORS.fat, 'g')}
        </div>
      `;
    }

    const mealsCard = document.getElementById('mealsCard');
    const mealsList = document.getElementById('mealsList');
    if(todaysMeals.length === 0){
      mealsCard.style.display = 'block';
      mealsList.innerHTML = `<div class="empty"><span class="emoji">🍽️</span>No meals logged today</div>`;
    } else {
      mealsCard.style.display = 'block';
      const sorted = [...todaysMeals].sort((a,b) => (a.time||'').localeCompare(b.time||''));
      mealsList.innerHTML = sorted.map(m => `
        <div class="meal-item">
          <div>
            <div class="desc">${escapeHtml(m.description || 'Meal')}</div>
            <div class="time">${m.time || ''}${m.source ? ' · ' + escapeHtml(m.source) : ''}</div>
            <div class="macros">P ${Math.round(m.protein_g||0)}g · C ${Math.round(m.carbs_g||0)}g · F ${Math.round(m.fat_g||0)}g</div>
          </div>
          <div class="kcal">${Math.round(m.kcal||0)}</div>
        </div>
      `).join('');
    }
  }

  function macroBarRow(name, val, target, color, unit){
    const pct = clampPct(val, target);
    return `
      <div class="macro-bar-row">
        <div class="top">
          <span class="name">${name}</span>
          <span class="nums">${Math.round(val)}${unit} / ${target ?? '—'}${unit}</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%; background:${color};"></div></div>
      </div>
    `;
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function last14Days(){
    const arr = [];
    for(let i=13; i>=0; i--) arr.push(daysAgoStr(i));
    return arr;
  }

  function renderTrends(profile, foodLog){
    const days = last14Days();
    const phase = getActivePhase(profile);
    const targets = phase ? (phase.targets || phase) : {};

    const byDay = {};
    (foodLog || []).forEach(m => {
      if(!byDay[m.date]) byDay[m.date] = {kcal:0, protein_g:0};
      byDay[m.date].kcal += Number(m.kcal)||0;
      byDay[m.date].protein_g += Number(m.protein_g)||0;
    });

    const labels = days.map(fmtDateShort);
    const kcalData = days.map(d => byDay[d] ? Math.round(byDay[d].kcal) : null);
    const proteinData = days.map(d => byDay[d] ? Math.round(byDay[d].protein_g) : null);

    const hasAnyFood = (foodLog || []).length > 0;

    const kcalCtx = document.getElementById('kcalChart');
    const proteinCtx = document.getElementById('proteinChart');

    if(!hasAnyFood){
      kcalCtx.parentElement.innerHTML = `<div class="empty"><span class="emoji">📊</span>No food log data yet</div>`;
      proteinCtx.parentElement.innerHTML = `<div class="empty"><span class="emoji">📊</span>No food log data yet</div>`;
      return;
    }

    new Chart(kcalCtx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'Calories',
            data: kcalData,
            borderColor: CHART_COLORS.kcal,
            backgroundColor: CHART_COLORS.kcal + '33',
            fill: true,
            tension: 0.3,
            spanGaps: true,
            pointRadius: 2.5
          },
          targets.kcal ? {
            label: 'Target',
            data: days.map(() => targets.kcal),
            borderColor: CHART_COLORS.kcalTarget,
            borderDash: [5,5],
            pointRadius: 0,
            fill: false
          } : null
        ].filter(Boolean)
      },
      options: baseLineOptions()
    });

    new Chart(proteinCtx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'Protein (g)',
            data: proteinData,
            borderColor: CHART_COLORS.protein,
            backgroundColor: CHART_COLORS.protein + '33',
            fill: true,
            tension: 0.3,
            spanGaps: true,
            pointRadius: 2.5
          },
          targets.protein_g ? {
            label: 'Target',
            data: days.map(() => targets.protein_g),
            borderColor: CHART_COLORS.proteinTarget,
            borderDash: [5,5],
            pointRadius: 0,
            fill: false
          } : null
        ].filter(Boolean)
      },
      options: baseLineOptions()
    });
  }

  function baseLineOptions(){
    return {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: true, position: 'bottom', labels: { boxWidth: 10, padding: 10 } },
        tooltip: { backgroundColor: '#1b1f2b', borderColor: '#252a38', borderWidth: 1 }
      },
      scales: {
        x: { grid: { color: '#1b1f2b' }, ticks: { maxRotation: 0, autoSkip: true, maxTicksLimit: 7 } },
        y: { grid: { color: '#1b1f2b' }, beginAtZero: true }
      }
    };
  }

  function renderWeight(profile, weightLog){
    const card = document.getElementById('weightCard');
    if(!weightLog || weightLog.length === 0){
      card.innerHTML = `<div class="empty"><span class="emoji">⚖️</span>No weight data yet</div>`;
      return;
    }

    const sorted = [...weightLog].sort((a,b) => a.date.localeCompare(b.date));
    const recent = sorted.slice(-30); // last 30 entries for chart context

    const labels = recent.map(w => fmtDateShort(w.date));
    const raw = recent.map(w => w.weight_lb);

    // 7-day moving average based on chronological order within `recent`
    const ma = recent.map((_, i) => {
      const start = Math.max(0, i - 6);
      const slice = recent.slice(start, i+1);
      const sum = slice.reduce((s,w) => s + (Number(w.weight_lb)||0), 0);
      return +(sum / slice.length).toFixed(1);
    });

    const phase = getActivePhase(profile);
    const latest = sorted[sorted.length - 1];
    const first = sorted[0];
    const totalChange = (latest.weight_lb - first.weight_lb).toFixed(1);

    let phaseInfo = '';
    if(profile && profile.current_phase && phase){
      phaseInfo = `
        <div style="display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap;">
          <span class="phase-tag">${phaseDisplayName(profile.current_phase)}${phase.window ? ' · ' + phase.window : ''}</span>
          ${(phase.rate_lb_per_wk || phase.weight_trend) ? `<span class="phase-tag" style="background:rgba(59,130,246,0.12); color:${CHART_COLORS.weightMA}; border-color:rgba(59,130,246,0.35);">Target: ${phase.rate_lb_per_wk ? phase.rate_lb_per_wk + ' lb/wk' : phase.weight_trend}</span>` : ''}
        </div>`;
    }

    card.innerHTML = `
      ${phaseInfo}
      <div class="grid3" style="margin-bottom:14px;">
        <div class="stat-pill"><div class="num">${latest.weight_lb}</div><div class="lbl">Current</div></div>
        <div class="stat-pill"><div class="num">${totalChange > 0 ? '+' : ''}${totalChange}</div><div class="lbl">Change</div></div>
        <div class="stat-pill"><div class="num">${ma[ma.length-1]}</div><div class="lbl">7d Avg</div></div>
      </div>
      <div class="chart-wrap tall"><canvas id="weightChart"></canvas></div>
    `;

    new Chart(document.getElementById('weightChart'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'Weight',
            data: raw,
            borderColor: CHART_COLORS.weight + '55',
            backgroundColor: 'transparent',
            pointRadius: 2,
            pointBackgroundColor: CHART_COLORS.weight,
            borderWidth: 1,
            tension: 0.2
          },
          {
            label: '7-day avg',
            data: ma,
            borderColor: CHART_COLORS.weightMA,
            backgroundColor: 'transparent',
            pointRadius: 0,
            borderWidth: 2.5,
            tension: 0.3
          }
        ]
      },
      options: baseLineOptions()
    });
  }

  function renderTodayWorkout(trainingPlan){
    const card = document.getElementById('todayWorkoutCard');
    const body = document.getElementById('todayWorkoutBody');

    if(!trainingPlan || !trainingPlan.week){
      card.style.display = 'none';
      return;
    }

    const key = todayWeekdayKey();
    const day = trainingPlan.week[key];

    if(!day){
      card.style.display = 'none';
      return;
    }

    card.style.display = 'block';

    const type = String(day.type || 'rest').toLowerCase();
    const tagClass = type === 'strength' ? 'type-strength' : type === 'cardio' ? 'type-cardio' : 'type-rest';
    const tagLabel = type.charAt(0).toUpperCase() + type.slice(1);
    const exercises = day.exercises || [];

    body.innerHTML = `
      <div style="display:flex; align-items:center; justify-content:space-between; gap:10px; ${exercises.length ? 'margin-bottom:12px;' : ''}">
        <div style="font-size:15px; font-weight:700;">${escapeHtml(day.focus || 'Rest')}</div>
        <span class="type-tag ${tagClass}">${escapeHtml(tagLabel)}</span>
      </div>
      ${exercises.length ? `
        <div>
          ${exercises.map(ex => `
            <div class="workout-item">
              <div class="t">${escapeHtml(ex.name || '')}</div>
              ${ex.scheme ? `<div class="m">${escapeHtml(ex.scheme)}</div>` : ''}
            </div>
          `).join('')}
        </div>
      ` : ''}
      ${trainingPlan.notes ? `<div class="empty" style="padding:12px 0 0; text-align:left;">${escapeHtml(trainingPlan.notes)}</div>` : ''}
    `;
  }

  function classifyWorkout(type){
    const cardioRe = /run|ride|bike|swim|walk|hike|row|elliptical|virtual/i;
    return cardioRe.test(type || '') ? 'cardio' : 'strength';
  }

  function workoutItemHtml(w){
    return `
      <div class="workout-item">
        <div>
          <div class="t">${escapeHtml(w.type || 'Workout')}</div>
          <div class="m">${weekdayShort(w.date)}</div>
        </div>
        <div class="m">${w.minutes ? w.minutes + ' min' : ''}${w.kcal ? ' · ' + Math.round(w.kcal) + ' kcal' : ''}</div>
      </div>
    `;
  }

  function renderTraining(healthDaily, trainingPlan){
    const card = document.getElementById('trainingCard');
    const weekStart = startOfWeekStr();
    const today = todayStr();

    const weekData = (healthDaily || []).filter(h => h.date >= weekStart && h.date <= today);
    const workouts = [];
    weekData.forEach(h => {
      (h.workouts || []).forEach(w => workouts.push({...w, date: h.date}));
    });

    if(workouts.length === 0){
      card.innerHTML = `<div class="empty"><span class="emoji">🏋️</span>No workouts logged this week</div>`;
    } else {
      const strength = workouts.filter(w => classifyWorkout(w.type) === 'strength').sort((a,b) => a.date.localeCompare(b.date));
      const cardio = workouts.filter(w => classifyWorkout(w.type) === 'cardio').sort((a,b) => a.date.localeCompare(b.date));

      const weeklyTargets = (trainingPlan && trainingPlan.weekly_targets) || {};
      const strengthTarget = weeklyTargets.strength ?? 3;
      const cardioTarget = weeklyTargets.cardio ?? 2;

      const strengthPct = Math.min(100, (strength.length/strengthTarget)*100);
      const cardioPct = Math.min(100, (cardio.length/cardioTarget)*100);

      card.innerHTML = `
        <div class="macro-bar-row" style="margin-bottom:10px;">
          <div class="top">
            <span class="name">Strength</span>
            <span class="nums">${strength.length} / ${strengthTarget}</span>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:${strengthPct}%; background:${CHART_COLORS.protein};"></div></div>
        </div>
        <div class="macro-bar-row" style="margin-bottom:14px;">
          <div class="top">
            <span class="name">Cardio</span>
            <span class="nums">${cardio.length} / ${cardioTarget}</span>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:${cardioPct}%; background:${CHART_COLORS.carbs};"></div></div>
        </div>
        <div class="section-title" style="margin-bottom:6px;">Strength</div>
        <div>
          ${strength.length ? strength.map(workoutItemHtml).join('') : `<div class="empty" style="padding:14px;">No strength workouts this week</div>`}
        </div>
        <div class="section-title" style="margin:14px 0 6px;">Cardio</div>
        <div>
          ${cardio.length ? cardio.map(workoutItemHtml).join('') : `<div class="empty" style="padding:14px;">No cardio workouts this week</div>`}
        </div>
      `;
    }

    // Resting HR sparkline (last 14 days)
    const days = last14Days();
    const byDay = {};
    (healthDaily || []).forEach(h => { byDay[h.date] = h; });
    const hrData = days.map(d => byDay[d] && byDay[d].resting_hr != null ? byDay[d].resting_hr : null);
    const hasHr = hrData.some(v => v != null);

    const hrCard = document.getElementById('hrCard');
    if(hasHr){
      hrCard.style.display = 'block';
      new Chart(document.getElementById('hrChart'), {
        type: 'line',
        data: {
          labels: days.map(fmtDateShort),
          datasets: [{
            label: 'Resting HR',
            data: hrData,
            borderColor: CHART_COLORS.hr,
            backgroundColor: CHART_COLORS.hr + '22',
            fill: true,
            tension: 0.35,
            spanGaps: true,
            pointRadius: 2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1b1f2b' } },
          scales: {
            x: { grid: { display: false }, ticks: { maxTicksLimit: 5 } },
            y: { grid: { color: '#1b1f2b' } }
          }
        }
      });
    } else {
      hrCard.style.display = 'none';
    }
  }

  function epley(weight, reps){
    return Math.round((Number(weight) || 0) * (1 + (Number(reps) || 0) / 30));
  }

  function subtractDaysStr(dstr, n){
    const d = new Date(dstr + 'T00:00:00');
    d.setDate(d.getDate() - n);
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  }

  function renderLifts(liftLog){
    const body = document.getElementById('liftBody');
    const log = liftLog || [];

    if(log.length === 0){
      body.innerHTML = `<div class="empty"><span class="emoji">💪</span>No lifts logged yet — text your coach "bench 185x8"</div>`;
      return;
    }

    const cutoff = daysAgoStr(90);
    const recent = log.filter(r => r && r.date >= cutoff);

    // Best (max) e1RM per exercise per date
    const byExerciseDate = {};
    recent.forEach(r => {
      const ex = String(r.exercise || '').toLowerCase();
      if(!ex || !r.date) return;
      const e1rm = epley(r.weight_lb, r.reps);
      if(!byExerciseDate[ex]) byExerciseDate[ex] = {};
      if(byExerciseDate[ex][r.date] == null || e1rm > byExerciseDate[ex][r.date]){
        byExerciseDate[ex][r.date] = e1rm;
      }
    });

    const presentMainLifts = MAIN_LIFTS.filter(ex => byExerciseDate[ex] && Object.keys(byExerciseDate[ex]).length);

    if(presentMainLifts.length === 0){
      body.innerHTML = `<div class="empty"><span class="emoji">💪</span>No lifts logged yet — text your coach "bench 185x8"</div>`;
      return;
    }

    const allDatesSet = new Set();
    presentMainLifts.forEach(ex => Object.keys(byExerciseDate[ex]).forEach(d => allDatesSet.add(d)));
    const allDates = [...allDatesSet].sort();
    const labels = allDates.map(fmtDateShort);

    const pillsHtml = presentMainLifts.map(ex => {
      const dates = Object.keys(byExerciseDate[ex]).sort();
      const latestDate = dates[dates.length - 1];
      const current = byExerciseDate[ex][latestDate];

      const targetDate = subtractDaysStr(latestDate, 30);
      const priorDates = dates.filter(d => d <= targetDate);
      let deltaHtml = '';
      if(priorDates.length){
        const priorDate = priorDates[priorDates.length - 1];
        const prior = byExerciseDate[ex][priorDate];
        const delta = current - prior;
        if(delta > 0){
          deltaHtml = `<div style="font-size:11px; margin-top:2px; color:${CHART_COLORS.protein};">▲ ${delta}</div>`;
        } else if(delta < 0){
          deltaHtml = `<div style="font-size:11px; margin-top:2px; color:var(--bad);">▼ ${Math.abs(delta)}</div>`;
        } else {
          deltaHtml = `<div style="font-size:11px; margin-top:2px; color:var(--muted);">— 0</div>`;
        }
      }

      return `
        <div class="stat-pill" style="flex:1; min-width:80px;">
          <div class="num">${current}</div>
          <div class="lbl">${escapeHtml(LIFT_LABELS[ex])} e1RM</div>
          ${deltaHtml}
        </div>
      `;
    }).join('');

    body.innerHTML = `
      <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px;">${pillsHtml}</div>
      <div class="chart-wrap tall"><canvas id="liftChart"></canvas></div>
    `;

    const datasets = presentMainLifts.map(ex => ({
      label: LIFT_LABELS[ex],
      data: allDates.map(d => byExerciseDate[ex][d] != null ? byExerciseDate[ex][d] : null),
      borderColor: CHART_COLORS[ex],
      backgroundColor: CHART_COLORS[ex] + '33',
      fill: false,
      tension: 0.3,
      spanGaps: true,
      pointRadius: 2.5
    }));

    new Chart(document.getElementById('liftChart'), {
      type: 'line',
      data: { labels, datasets },
      options: baseLineOptions()
    });
  }

  init();
})();
</script>

</body>
</html>
